          - generic [ref=e21]:
            - heading "About ClickHouse" [level=3] [ref=e22]
            - paragraph [ref=e23]: Recognized on the 2025 Forbes Cloud 100 list, ClickHouse is one of the most innovative and fast-growing private cloud companies. With more than 3,000 customers and ARR that has grown over 250 percent year over year, ClickHouse leads the market in real-time analytics, data warehousing, observability, and AI workloads.
            - paragraph [ref=e24]: The company’s sustained, accelerating momentum was recently validated by a $400M Series D financing round. Over the past three months, customers including Capital One, Lovable, Decagon, Polymarket, and Airwallex have adopted the platform or expanded existing deployments. These customers join an established base of AI innovators and global brands such as Meta, Cursor, Sony, and Tesla.
            - paragraph [ref=e25]: We’re on a mission to transform how companies use data. Come be a part of our journey!
          - generic [ref=e26]:
            - paragraph [ref=e27]: The Control Plane Infrastructure team develops and manages the foundational resources and tools for the Control Plane Platform. This includes compute, storage, networking, security, and a multi-region architecture that provides a reliable and scalable managed Cloud Console experience for ClickHouse Cloud customers. Our team is looking for highly skilled and experienced cloud platform engineers to join our team, who will be responsible for designing, deploying, and maintaining our infrastructure.
            - paragraph [ref=e28]:
              - strong [ref=e29]: "What you will do:"
            - list [ref=e30]:
              - listitem [ref=e31]: Design, implement and maintain scalable, highly available, and secure cloud-based infrastructure in AWS (EKS, SQS, DocumentDB, Redis, PostgreSQL, Lambdas)
              - listitem [ref=e32]: Experience with containerization technologies (Docker, Kubernetes) and orchestration platforms
              - listitem [ref=e33]: Automate the provisioning of cloud infrastructure using Infrastructure as Code (IaC) tools such as Terraform, AWS CDK, CloudFormation, or ARM templates
              - listitem [ref=e34]: Define and implement strategies for load balancing, auto-scaling, disaster recovery, and failover for cloud environments
              - listitem [ref=e35]: Collaborate with cross-functional teams to ensure seamless integration, scalability, and security of cloud environments
              - listitem [ref=e36]: Enhancing DevX
              - listitem [ref=e37]: Helping with instrumentation of cloud monitoring and alerting solutions
              - listitem [ref=e38]: Work with the security team to implement security best practices, including identity and access management (IAM), network security, encryption, and compliance controls within the cloud infrastructure
              - listitem [ref=e39]: Identify and correct bottlenecks and fix bugs
            - paragraph [ref=e40]:
              - strong [ref=e41]: "What you bring along:"
            - list [ref=e42]:
              - listitem [ref=e43]: Minimum 6+ years of experience in cloud infrastructure engineering or related roles
              - listitem [ref=e44]: Strong proficiency in Kubernetes, SQS, RDBMS, Node.JS
              - listitem [ref=e45]: Deep understanding of cloud architecture, networking, and security
              - listitem [ref=e46]: Proven experience designing and operating large-scale public and internal APIs
              - listitem [ref=e47]: Excellent problem-solving skills and attention to detail
              - listitem [ref=e48]: Knowledge of CI/CD pipelines
            - paragraph [ref=e49]:
              - strong [ref=e50]: "Preferred Qualifications:"
            - list [ref=e51]:
              - listitem [ref=e52]: Proficiency with frontend frameworks (React)
              - listitem [ref=e53]: Experience with ClickHouse
              - listitem [ref=e54]: Previous experience in developing analytics or data-intensive applications
