              - heading "Senior Site Reliability Engineer, TCore (FedRamp)" [level=1] [ref=e107]
              - generic [ref=e108]: San Francisco, California
            - generic [ref=e109]:
              - article [ref=e110]:
                - paragraph [ref=e111]:
                  - strong [ref=e112]: Secure Every Identity, from AI to Human
                  - text: Identity is the key to unlocking the potential of AI. Okta secures AI by building the trusted, neutral infrastructure that enables organizations to safely embrace this new era. This work requires a relentless drive to solve complex challenges with real-world stakes. We are looking for builders and owners who operate with speed and urgency and execute with excellence.
                  - text: This is an opportunity to do career-defining work. We're all in on this mission. If you are too, let's talk.
                - paragraph [ref=e113]:
                  - strong [ref=e114]: The Team
                - paragraph [ref=e115]: The TCore team is a specialized engineering group that owns and operates all of Okta's networks. They are focused on ensuring the reliability, performance, and security of Okta's core infrastructure, particularly its global traffic entry points and the complete internal networking.
                - paragraph [ref=e116]:
                  - strong [ref=e117]: The Role
                - paragraph [ref=e118]: We are looking for a Senior Site Reliability Engineer to join the TCore team. The ideal candidate is someone who enjoys analyzing systems and identifying areas of opportunity to improve system performance, availability and capacity. They are part systems administrator, part network administrator, and part developer.
                - paragraph [ref=e119]:
                  - strong [ref=e120]: What you’ll be doing
                - list [ref=e121]:
                  - listitem [ref=e122]: Maintain a highly available cloud infrastructure edge for the Okta identity platform
                  - listitem [ref=e123]: Collect and analyze data to identify root causes for network-specific events
                  - listitem [ref=e124]: Automate AWS infrastructure with Terraform and/or Chef
                  - listitem [ref=e125]: Evolve the system by introducing changes to improve efficiency, scalability, and velocity
                - paragraph [ref=e126]:
                  - strong [ref=e127]: What you’ll bring to the role
                - list [ref=e128]:
                  - listitem [ref=e129]: 3+ years experience in a Cloud Network Engineer role or related, with experience configuring, deploying, monitoring and troubleshooting applications and infrastructure in the cloud
                  - listitem [ref=e130]: Demonstrated in-depth understanding of TCP/IP networking stack; (layer 2 through 7). Ability to implement a highly available VPC network, including inter-vpc connectivity. Working knowledge of stateless and stateful firewalls. Familiar with DNS, web-application firewalls, and various load balancing methods available in the cloud.
                  - listitem [ref=e131]: 3-5+ years administering or operating within a Linux environment, strong experience using Linux based tooling, and ability to debug systems level problems
                  - listitem [ref=e132]: In-depth understanding of TCP/IP, HTTP, Load Balancing, DNS and other networking protocols
                  - listitem [ref=e133]: Solid understanding and experience with Apache httpd, nginx, Apache Tomcat, or similar
                  - listitem [ref=e134]: Strong problem solving and debugging skills coupled with a desire to take on ownership and responsibility
                  - listitem [ref=e135]: Proficiency in Bash, Python, Golang, or similar. Experienced with git
                  - listitem [ref=e136]: Experience working with Terraform, Ansible, Chef, Puppet or similar automation tools
                  - listitem [ref=e137]: Excellent written and verbal communication skills
                  - listitem [ref=e138]: Willingness to work on-call
                - paragraph [ref=e139]:
                  - strong [ref=e140]: And extra credit if you have experience in any of the following!
                - list [ref=e141]:
                  - listitem [ref=e142]: Experience working in a security-oriented cloud environment
                  - listitem [ref=e143]: Experience debugging software using gdb, strace, ltrace, tcpdump, Wireshark, etc.
                  - listitem [ref=e144]: Experience working with Docker and Kubernetes
                  - listitem [ref=e145]: Experience with PKI / certificate management (edited)
                - paragraph [ref=e146]:
                  - strong [ref=e147]: "Additional requirements:"
                - list [ref=e148]:
                  - listitem [ref=e149]: This position requires the ability to access federal environments and/or have access to protected federal data. As a condition of employment for this position, the successful candidate must be able to submit documentation establishing U.S. Person status (e.g. a U.S. Citizen, National, Lawful Permanent Resident, Refugee, or Asylee. 22 CFR 120.15) upon hire.
                - paragraph [ref=e150]: "#LI-SM1"
