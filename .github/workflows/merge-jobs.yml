name: Merge jobs (combined)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Collect jobs"
      - "Collect jobs (DuckDuckGo)"
    types:
      - completed
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Merge job files
        run: python3 merge_jobs.py

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: latest-jobs-combined
          path: latest_jobs_combined.csv

      - name: Commit combined file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_jobs_combined.csv
          git diff --cached --quiet || git commit -m "Update combined jobs"
          git pull origin main -X ours --no-rebase
          git push
